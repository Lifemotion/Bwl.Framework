name: Publish NuGet

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Extract version from tag
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Pack
      run: |
        dotnet pack Bwl.Framework/Bwl.Framework.vbproj -c Release -o ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}
        dotnet pack Bwl.Framework.WinForms/Bwl.Framework.WinForms.vbproj -c Release -o ./nupkgs /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Push to NuGet
      run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
